filetype: markdown

detect:
    filename: "\\.(livemd|md|mkd|mkdn|markdown)$"

rules:
    # Tables (Github extension)
    - markup.table: ".*[ :]\\|[ :].*"

      # quotes
    - markup.quote:  "^>.*"

      # Emphasis (italic)
    - markup.italic: "(^|[[:space:]])(_[^ ][^_]*_|\\*[^ ][^*]*\\*)"

      # Strong emphasis (bold)
    - markup.bold: "(^|[[:space:]])(__[^ ][^_]*__|\\*\\*[^ ][^*]*\\*\\*)"

      # strike-through
    - markup.strike: "(^|[[:space:]])~~[^ ][^~]*~~"

      # horizontal rules
    - markup.heading: "^(---+|===+|___+|\\*\\*\\*+)\\s*$"

      # headlines
    - markup.heading:  "^#{1,6}.*"

      # lists
    - markup.list:   "^[[:space:]]*[\\*+-] |^[[:space:]]*[0-9]+\\. "

      # misc
    - preproc:   "(\\(([CcRr]|[Tt][Mm])\\)|\\.{3}|(^|[[:space:]])\\-\\-($|[[:space:]]))"

      # link text  [text]  and  [text](url)
    - markup.link: "\\[[^]]+\\]"
    - markup.link: "\\[([^][]|\\[[^]]*\\])*\\]\\([^)]+\\)"

      # images
    - markup.url: "!\\[[^][]*\\](\\([^)]+\\)|\\[[^]]+\\])"

      # bare urls
    - markup.url: "https?://[^ )>]+"

      # fenced / inline code
    - markup.code: "^```$"

    - markup.code:
        start: "`"
        end: "`"
        rules: []
